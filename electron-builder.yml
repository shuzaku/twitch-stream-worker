appId: com.fightersedge.autostream
productName: FightersEdge AutoStream
copyright: Copyright © 2026 FightersEdge

directories:
  buildResources: build
  output: release

files:
  - dist-electron/**
  - dist-renderer/**
  - src/overlay/**
  - node_modules/**
  - package.json
  - .env

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: FightersEdge AutoStream

publish: null
