appId: com.fightersedge.fgcloops
productName: FGC Loops
copyright: Copyright © 2026 FightersEdge

directories:
  buildResources: build
  output: dist-release

files:
  - dist-electron/**
  - dist-renderer/**
  - src/overlay/**
  - node_modules/**
  - package.json

# Note: .env is intentionally NOT bundled. Production constants are baked
# into the build via src/config.ts. End users do not need a .env file.

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  # Signing is handled post-build by `npm run sign:output` (calls signtool
  # directly, bypassing the winCodeSign download that requires Developer Mode).
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: FGC Loops

publish: null
