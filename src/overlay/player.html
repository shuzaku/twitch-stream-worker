<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FightersEdge Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #242832;
      font-family: 'Roboto', sans-serif;
    }

    /* ── YouTube container ───────────────────────────────────────── */
    #yt-container {
      position: absolute;
      inset: 0;
    }

    #yt-container iframe,
    #yt-container > div {
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Top-right watermark ─────────────────────────────────────── */
    #watermark {
      position: absolute;
      top: 18px;
      right: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.92;
      pointer-events: none;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.7));
    }

    #watermark img {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    #watermark-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
    }

    #watermark-title {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.5px;
      line-height: 1;
    }

    #watermark-subtitle {
      font-size: 10px;
      font-weight: 500;
      color: #3eb489;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      line-height: 1;
    }

    /* ── Bottom now-playing bar ──────────────────────────────────── */
    #now-playing-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: linear-gradient(90deg, rgba(28,28,36,0.97) 0%, rgba(36,40,50,0.93) 100%);
      border-top: 2px solid #3eb489;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      pointer-events: none;
    }

    /* Logo section */
    #bar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #bar-logo img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    #bar-logo-text {
      font-size: 15px;
      font-weight: 800;
      color: #3eb489;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    #divider {
      width: 1px;
      height: 34px;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }

    #now-playing-label {
      font-size: 10px;
      font-weight: 700;
      color: #3eb489;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #video-title {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    #matchup {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      white-space: nowrap;
      flex-shrink: 0;
    }

    #game-tag {
      background: linear-gradient(135deg, #3eb489 0%, #2d8a6a 100%);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 5px 11px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      flex-shrink: 0;
      display: none;
    }

    /* ── Loading / waiting state ─────────────────────────────────── */
    #waiting {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #242832;
      gap: 20px;
    }

    #waiting img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      opacity: 0.6;
    }

    #waiting-text {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div id="waiting">
    <img src="https://res.cloudinary.com/shuzchef/image/upload/v1622816435/bb5h6tgdysfys9qi1du5.png" alt="" />
    <span id="waiting-text">Loading playlist...</span>
  </div>

  <div id="yt-container"></div>

  <!-- Top-right watermark -->
  <div id="watermark">
    <img src="https://res.cloudinary.com/shuzchef/image/upload/v1622816435/bb5h6tgdysfys9qi1du5.png" alt="FightersEdge" />
    <div id="watermark-text">
      <span id="watermark-title">Fighters-Edge</span>
      <span id="watermark-subtitle">Fighting Game Hub</span>
    </div>
  </div>

  <!-- Bottom bar -->
  <div id="now-playing-bar">
    <div id="bar-logo">
      <img src="https://res.cloudinary.com/shuzchef/image/upload/v1622816435/bb5h6tgdysfys9qi1du5.png" alt="" />
      <span id="bar-logo-text">Fighters-Edge</span>
    </div>
    <div id="divider"></div>
    <span id="now-playing-label">Now Playing</span>
    <span id="video-title">Loading...</span>
    <span id="matchup"></span>
    <span id="game-tag"></span>
  </div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const WS_URL = `ws://${location.host}`

    let player = null
    let ws = null
    let ytReady = false
    let pendingVideoId = null

    // ── YouTube IFrame API ────────────────────────────────────────────────

    window.onYouTubeIframeAPIReady = function () {
      ytReady = true
      player = new YT.Player('yt-container', {
        width: '1920',
        height: '1080',
        playerVars: {
          autoplay: 1,
          mute: 1,           // start muted so autoplay is allowed; unmuted on PLAYING
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
          rel: 0,
          iv_load_policy: 3,
          cc_load_policy: 0,
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange,
          onError: onPlayerError,
        },
      })
    }

    function onPlayerReady() {
      send({ type: 'ready' })
      if (pendingVideoId) {
        player.loadVideoById(pendingVideoId)
        pendingVideoId = null
      }
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.PLAYING) {
        player.unMute()
        player.setVolume(100)
      } else if (event.data === YT.PlayerState.CUED) {
        player.playVideo()
      } else if (event.data === YT.PlayerState.ENDED) {
        send({ type: 'ended' })
      }
    }

    function onPlayerError(event) {
      send({ type: 'error', code: event.data })
    }

    function loadVideo(videoId) {
      document.getElementById('waiting').style.display = 'none'
      if (!player || !ytReady) {
        pendingVideoId = videoId
        return
      }
      player.loadVideoById(videoId)
    }

    // ── Overlay update ────────────────────────────────────────────────────

    function updateOverlay(data) {
      document.getElementById('video-title').textContent =
        data.title || `Match: ${data.videoId}`

      const matchup = (data.player1 && data.player2)
        ? `${data.player1} vs ${data.player2}`
        : (data.player1 || data.player2 || '')
      document.getElementById('matchup').textContent = matchup

      const gameEl = document.getElementById('game-tag')
      if (data.game) {
        gameEl.textContent = data.game
        gameEl.style.display = 'inline-block'
      } else {
        gameEl.style.display = 'none'
      }
    }

    // ── WebSocket ─────────────────────────────────────────────────────────

    function send(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg))
      }
    }

    function connectWS() {
      ws = new WebSocket(WS_URL)

      ws.addEventListener('open', () => {
        console.log('[ws] Connected to player server')
      })

      ws.addEventListener('message', (event) => {
        let msg
        try { msg = JSON.parse(event.data) } catch { return }
        if (msg.type === 'play') {
          updateOverlay(msg)
          loadVideo(msg.videoId)
        }
      })

      ws.addEventListener('close', () => {
        console.warn('[ws] Disconnected — reconnecting in 2s')
        setTimeout(connectWS, 2000)
      })

      ws.addEventListener('error', () => {
        ws.close()
      })
    }

    connectWS()
  </script>
</body>
</html>
